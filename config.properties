# ============================================
# Project3 部署配置文件
# JDK + JAR + SSH 模式
# ============================================

# ---------- 远程服务器连接配置 ----------
# SSH 主机地址
server.host=192.168.1.100
# SSH 端口
server.port=22
# SSH 用户名
server.username=root
# SSH 密码（建议用 GitHub Secrets 替代明文）
server.password=your_password_here

# ---------- 远程部署路径 ----------
# 项目部署根目录
deploy.remote.home=/opt/project3
# JAR 包存放目录
deploy.remote.lib=/opt/project3/lib
# 日志目录
deploy.remote.logs=/opt/project3/logs
# 数据文件目录（question.txt / Results.txt）
deploy.remote.data=/opt/project3/data

# ---------- JDK 配置 ----------
# 编译用的 JDK 版本
jdk.version=17
# 远程服务器 JDK 路径
jdk.remote.path=/usr/lib/jvm/java-17-openjdk

# ---------- JAR 配置 ----------
# 主类全限定名
app.main.class=Project3
# JAR 文件名
jar.name=Project3.jar
# JVM 启动参数
jvm.options=-Xms256m -Xmx512m

# ---------- 应用程序配置 ----------
# 问题文件路径（相对于工作目录）
app.question.file=data/question.txt
# 结果文件路径
app.result.file=data/Results.txt
