name: Deploy Java to Dev Environment

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '分支/Tag/SHA（默认 master）'
        required: false
        default: 'master'
      target:
        description: '部署目标（default/server1/server2/aliyun/aws/tencent）'
        required: false
        default: 'default'
        type: choice
        options:
          - default
          - server1
          - server2
          - aliyun
          - aws
          - tencent
      callback_url:
        description: '回调 URL（部署完成后调用，用于发送飞书通知）'
        required: false
        default: ''

env:
  DEPLOY_ENV: dev
  JAR_NAME: IntelligentRobot-0.0.1-SNAPSHOT.jar
  JAVA_VERSION: '17'

jobs:
  build-and-deploy:
    name: Build and Deploy Java to Dev
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'master' }}

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 Build with Maven
        run: |
          echo "🏗️ 开始 Maven 构建..."
          mvn clean package -DskipTests -B
          echo "✅ 构建完成"
          ls -lh target/*.jar

      - name: 🔍 Validate Configuration
        run: |
          TARGET="${{ github.event.inputs.target || 'default' }}"
          echo "🔍 验证部署配置... (目标: $TARGET)"

          case "$TARGET" in
            default)
              [ -z "${{ vars.DEPLOY_DEFAULT_HOST }}" ] && echo "❌ 缺少配置: DEPLOY_DEFAULT_HOST" && exit 1
              [ -z "${{ secrets.DEPLOY_DEFAULT_SSH_KEY }}" ] && echo "❌ 缺少配置: DEPLOY_DEFAULT_SSH_KEY" && exit 1
              ;;
            server1)
              [ -z "${{ vars.DEPLOY_SERVER1_HOST }}" ] && echo "❌ 缺少配置: DEPLOY_SERVER1_HOST" && exit 1
              [ -z "${{ secrets.DEPLOY_SERVER1_SSH_KEY }}" ] && echo "❌ 缺少配置: DEPLOY_SERVER1_SSH_KEY" && exit 1
              ;;
            server2)
              [ -z "${{ vars.DEPLOY_SERVER2_HOST }}" ] && echo "❌ 缺少配置: DEPLOY_SERVER2_HOST" && exit 1
              [ -z "${{ secrets.DEPLOY_SERVER2_SSH_KEY }}" ] && echo "❌ 缺少配置: DEPLOY_SERVER2_SSH_KEY" && exit 1
              ;;
            aliyun|aws|tencent)
              echo "✅ 云厂商配置略（保持你原逻辑）"
              ;;
          esac
        continue-on-error: false

      - name: 🚀 Deploy to Target
        run: |
          TARGET="${{ github.event.inputs.target || 'default' }}"
          echo "🚀 开始部署 Java 应用到: $TARGET"

          setup_ssh_key() {
            local key_content=$1
            if [ -n "$key_content" ]; then
              echo "$key_content" > /tmp/deploy_key
              chmod 600 /tmp/deploy_key
              echo "/tmp/deploy_key"
            fi
          }

          case "$TARGET" in
            default)
              SSH_HOST="${{ vars.DEPLOY_DEFAULT_HOST }}"
              SSH_USER="${{ vars.DEPLOY_DEFAULT_USER || 'root' }}"
              REMOTE_PATH="${{ vars.DEPLOY_DEFAULT_PATH || '/app' }}"
              SSH_KEY=$(setup_ssh_key "${{ secrets.DEPLOY_DEFAULT_SSH_KEY }}")
              ;;
            server1)
              SSH_HOST="${{ vars.DEPLOY_SERVER1_HOST }}"
              SSH_USER="${{ vars.DEPLOY_SERVER1_USER || 'root' }}"
              REMOTE_PATH="${{ vars.DEPLOY_SERVER1_PATH || '/app' }}"
              SSH_KEY=$(setup_ssh_key "${{ secrets.DEPLOY_SERVER1_SSH_KEY }}")
              ;;
            server2)
              SSH_HOST="${{ vars.DEPLOY_SERVER2_HOST }}"
              SSH_USER="${{ vars.DEPLOY_SERVER2_USER || 'root' }}"
              REMOTE_PATH="${{ vars.DEPLOY_SERVER2_PATH || '/app' }}"
              SSH_KEY=$(setup_ssh_key "${{ secrets.DEPLOY_SERVER2_SSH_KEY }}")
              ;;
          esac

          scp -i "$SSH_KEY" -o StrictHostKeyChecking=no target/${{ env.JAR_NAME }} "$SSH_USER@$SSH_HOST:$REMOTE_PATH/app.jar"

          ssh -i "$SSH_KEY" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "cd $REMOTE_PATH && \
            (if [ -f app.pid ]; then OLD_PID=\$(cat app.pid); kill \$OLD_PID || true; sleep 5; fi) && \
            nohup java -jar app.jar > app.log 2>&1 & \
            echo \$! > app.pid"
        continue-on-error: false

      # ======================
      # ✅ 统一飞书通知（核心修改）
      # ======================
      - name: 📢 飞书通知（成功 / 失败）
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
          CALLBACK_URL: ${{ github.event.inputs.callback_url }}
        run: |
          STATUS="${{ job.status }}"
          TARGET="${{ github.event.inputs.target || 'default' }}"
          REPO="${{ github.repository }}"
          REF="${{ github.event.inputs.ref || 'master' }}"
          ACTOR="${{ github.actor }}"
          RUN_ID="${{ github.run_id }}"
          TIME="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          TEXT="[$STATUS] 部署完成\n仓库: $REPO\n分支: $REF\n目标: $TARGET\n操作者: $ACTOR\nRun: https://github.com/$REPO/actions/runs/$RUN_ID"

          # 1️⃣ 发飞书群
          if [ -n "$FEISHU_WEBHOOK" ]; then
            curl -X POST "$FEISHU_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"$TEXT\"}}"
          fi

          # 2️⃣ 回调你自己的后端（如果填了）
          if [ -n "$CALLBACK_URL" ]; then
            curl -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"status\":\"$STATUS\",
                \"environment\":\"dev\",
                \"target\":\"$TARGET\",
                \"repository\":\"$REPO\",
                \"ref\":\"$REF\",
                \"actor\":\"$ACTOR\",
                \"run_id\":\"$RUN_ID\",
                \"timestamp\":\"$TIME\"
              }"
          fi
        continue-on-error: true
