name: Deploy to Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 1.0.0-SNAPSHOT)'
        required: false
        type: string
        default: ''
      run_integration_tests:
        description: 'Run integration tests'
        required: false
        type: boolean
        default: true

env:
  MAVEN_OPTS: '-Xmx1024m -XX:MaxMetaspaceSize=512m'

jobs:
  build-and-deploy:
    name: Build, Test & Deploy to Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set version (if provided)
        if: inputs.version != ''
        run: |
          mvn versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false
          echo "DEPLOY_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
        shell: bash

      - name: Set default version
        if: inputs.version == ''
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "DEPLOY_VERSION=${VERSION}" >> $GITHUB_ENV
        shell: bash

      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      - name: Run unit tests
        run: mvn test -B

      - name: Run integration tests
        if: inputs.run_integration_tests == true
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
        run: |
          mvn verify -P integration-test \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/testdb \
            -Dspring.datasource.username=testuser \
            -Dspring.datasource.password=testpass \
            -Dspring.jpa.hibernate.ddl-auto=create-drop \
            -B

      - name: Check test results
        if: always()
        run: |
          if [ -f target/surefire-reports/*.xml ]; then
            echo "Unit test reports generated"
          fi
          if [ -f target/failsafe-reports/*.xml ]; then
            echo "Integration test reports generated"
          fi

      # Only deploy if all prior steps succeeded (tests passed)
      - name: Set up SSH
        if: success()
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.TEST_SSH_KEY }}
          known_hosts: unnecessary
          name: test-server-key
          config: |
            Host test-server
              HostName ${{ secrets.TEST_SSH_HOST }}
              User ${{ secrets.TEST_SSH_USER }}
              IdentityFile ~/.ssh/test-server-key
              StrictHostKeyChecking no

      - name: Deploy JAR to test server
        if: success()
        run: |
          JAR_FILE=$(find target -name "*.jar" ! -name "*sources.jar" ! -name "*javadoc.jar" | head -1)
          echo "Deploying ${JAR_FILE} version ${DEPLOY_VERSION} to test server..."

          # Upload JAR
          scp ${JAR_FILE} \
            test-server:${{ secrets.TEST_DEPLOY_PATH }}/app-${DEPLOY_VERSION}.jar

          # Deploy and restart on test server
          ssh test-server DEPLOY_VERSION="${DEPLOY_VERSION}" bash -s << 'EOF'
            set -e
            cd ${{ secrets.TEST_DEPLOY_PATH }}

            # Gracefully stop existing service
            if [ -f app.pid ]; then
              PID=$(cat app.pid)
              echo "Stopping service (PID $PID)..."
              kill -15 $PID 2>/dev/null || true
              # Wait for graceful shutdown (up to 30 seconds)
              for i in $(seq 1 30); do
                if ! kill -0 $PID 2>/dev/null; then
                  echo "Service stopped gracefully"
                  break
                fi
                sleep 1
              done
              # Force kill if still running
              if kill -0 $PID 2>/dev/null; then
                echo "Force killing service (PID $PID)"
                kill -9 $PID 2>/dev/null || true
              fi
            fi

            # Update symlink
            ln -sf app-${DEPLOY_VERSION}.jar app.jar

            # Start service
            nohup java -jar app.jar \
              --spring.profiles.active=test \
              > app.log 2>&1 &
            echo $! > app.pid
            echo "Service started with PID $(cat app.pid)"
          EOF

      - name: Wait for startup
        if: success()
        run: sleep 15

      - name: Health check
        if: success()
        run: |
          ssh test-server << 'EOF'
            for i in 1 2 3 4 5 6; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying..."
              sleep 5
            done
            echo "Health check failed after 6 attempts"
            exit 1
          EOF

      - name: Deployment summary
        if: always()
        run: |
          echo "================================================"
          echo "  Test Deployment"
          echo "  Version: ${DEPLOY_VERSION}"
          echo "  Integration Tests: ${{ inputs.run_integration_tests }}"
          echo "  Server: ${{ secrets.TEST_SSH_HOST }}"
          echo "================================================"
