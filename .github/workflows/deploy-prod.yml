name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (required)'
        required: true
        type: string
      confirm_deploy:
        description: 'I confirm this is an intentional production deployment'
        required: true
        type: boolean
        default: false
      rollback_version:
        description: 'Rollback to a previous version (leave empty for new deploy)'
        required: false
        type: string
        default: ''

env:
  MAVEN_OPTS: '-Xmx1024m -XX:MaxMetaspaceSize=512m'

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check confirm_deploy flag
        if: inputs.confirm_deploy != true
        run: |
          echo "ERROR: Production deployment requires confirm_deploy to be checked."
          echo "Please re-run the workflow and check the confirmation box."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          echo "Version: ${{ inputs.version }}"
          echo "Rollback: ${{ inputs.rollback_version }}"

  build-and-deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # --- Rollback path ---
      - name: Rollback - Set up SSH
        if: inputs.rollback_version != ''
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.PROD_SSH_KEY }}
          known_hosts: unnecessary
          name: prod-server-key
          config: |
            Host prod-server
              HostName ${{ secrets.PROD_SSH_HOST }}
              User ${{ secrets.PROD_SSH_USER }}
              IdentityFile ~/.ssh/prod-server-key
              StrictHostKeyChecking no

      - name: Rollback - Switch to previous version
        if: inputs.rollback_version != ''
        run: |
          echo "ROLLING BACK to version ${{ inputs.rollback_version }}"
          ssh prod-server << 'EOF'
            set -e
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            ROLLBACK_JAR="app-${{ inputs.rollback_version }}.jar"
            if [ ! -f "$ROLLBACK_JAR" ]; then
              echo "ERROR: Rollback JAR $ROLLBACK_JAR not found on server"
              exit 1
            fi

            echo "Found rollback target: $ROLLBACK_JAR"

            # Gracefully stop current
            if [ -f app.pid ]; then
              PID=$(cat app.pid)
              kill -15 $PID 2>/dev/null || true
              for i in $(seq 1 30); do
                if ! kill -0 $PID 2>/dev/null; then break; fi; sleep 1
              done
              kill -9 $PID 2>/dev/null || true
            fi

            # Switch symlink
            ln -sf $ROLLBACK_JAR app.jar

            # Start service
            nohup java -jar app.jar \
              --spring.profiles.active=prod \
              > app.log 2>&1 &
            echo $! > app.pid
            echo "Rollback complete. Service started with PID $(cat app.pid)"
          EOF

      # --- New deploy path ---
      - name: Set version
        if: inputs.rollback_version == ''
        run: |
          mvn versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false
          echo "DEPLOY_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
        shell: bash

      - name: Build with Maven
        if: inputs.rollback_version == ''
        run: mvn clean package -B

      - name: Run full test suite
        if: inputs.rollback_version == ''
        run: mvn verify -B

      - name: Verify test results
        if: inputs.rollback_version == ''
        run: |
          if [ ! -d target/surefire-reports ]; then
            echo "ERROR: No test reports found"
            exit 1
          fi
          FAILURES=$(grep -r 'failures="[1-9]\|errors="[1-9]' target/surefire-reports/*.xml 2>/dev/null || true)
          if [ -n "$FAILURES" ]; then
            echo "ERROR: Test failures detected:"
            echo "$FAILURES"
            exit 1
          fi
          echo "All tests passed"

      - name: Set up SSH
        if: inputs.rollback_version == ''
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.PROD_SSH_KEY }}
          known_hosts: unnecessary
          name: prod-server-key
          config: |
            Host prod-server
              HostName ${{ secrets.PROD_SSH_HOST }}
              User ${{ secrets.PROD_SSH_USER }}
              IdentityFile ~/.ssh/prod-server-key
              StrictHostKeyChecking no

      - name: Deploy JAR to production
        if: inputs.rollback_version == ''
        run: |
          JAR_FILE=$(find target -name "*.jar" ! -name "*sources.jar" ! -name "*javadoc.jar" | head -1)
          echo "Deploying ${JAR_FILE} version ${DEPLOY_VERSION} to PRODUCTION..."

          # Upload new JAR to production server
          scp ${JAR_FILE} \
            prod-server:${{ secrets.PROD_DEPLOY_PATH }}/app-${DEPLOY_VERSION}.jar

          # Switch to new version with zero-downtime if previous instance exists
          ssh prod-server << 'REMOTE_SCRIPT'
            set -e
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            # Check if there is an existing running instance
            if [ -f app.pid ] && kill -0 $(cat app.pid) 2>/dev/null; then
              OLD_PID=$(cat app.pid)
              echo "Existing service running (PID $OLD_PID)"

              # Update symlink to new JAR
              ln -sf app-${DEPLOY_VERSION}.jar app.jar

              # Graceful shutdown of old instance
              kill -15 $OLD_PID 2>/dev/null || true
              for i in $(seq 1 30); do
                if ! kill -0 $OLD_PID 2>/dev/null; then
                  echo "Old instance stopped gracefully"
                  break
                fi
                sleep 1
              done
              kill -9 $OLD_PID 2>/dev/null || true

              # Start new instance
              nohup java -jar app.jar \
                --spring.profiles.active=prod \
                > app.log 2>&1 &
              echo $! > app.pid
              echo "New instance started with PID $(cat app.pid)"
            else
              # Fresh deployment
              ln -sf app-${DEPLOY_VERSION}.jar app.jar
              nohup java -jar app.jar \
                --spring.profiles.active=prod \
                > app.log 2>&1 &
              echo $! > app.pid
              echo "Service started with PID $(cat app.pid)"
            fi
          REMOTE_SCRIPT

      - name: Wait for startup
        if: always() && steps.deploy-prod.conclusion == 'success'
        run: sleep 20

      - name: Health check
        run: |
          ssh prod-server << 'EOF'
            for i in 1 2 3 4 5 6 7 8; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                BODY=$(curl -s http://localhost:8080/actuator/health)
                echo "Health check passed: $BODY"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "CRITICAL: Health check failed after 8 attempts"
            exit 1
          EOF

      - name: Send notification on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Production Deployment Successful*\n*Version*: ${DEPLOY_VERSION}\n*Server*: ${{ secrets.PROD_SSH_HOST }}\n*Deployed by*: ${{ github.actor }}\n*Workflow*: ${{ github.workflow }}\n*Run*: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send notification on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *Production Deployment FAILED*\n*Version*: ${DEPLOY_VERSION}\n*Server*: ${{ secrets.PROD_SSH_HOST }}\n*Deployed by*: ${{ github.actor }}\n*Workflow*: ${{ github.workflow }}\n*Run*: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Deployment summary
        if: always()
        run: |
          echo "================================================"
          echo "  Production Deployment"
          echo "  Version: ${{ env.DEPLOY_VERSION || inputs.rollback_version }}"
          echo "  Type: ${{ inputs.rollback_version != '' && 'ROLLBACK' || 'NEW DEPLOY' }}"
          echo "  Server: ${{ secrets.PROD_SSH_HOST }}"
          echo "  Status: ${{ job.status }}"
          echo "================================================"
